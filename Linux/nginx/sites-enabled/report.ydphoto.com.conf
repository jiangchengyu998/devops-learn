server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name report.ydphoto.com;

    ssl_certificate /etc/ssl/ydphoto.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/ydphoto.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/security-locations.conf;

    limit_req zone=per_ip burst=60 nodelay;
    limit_conn per_ip_conn 30;

    root /var/www/goaccess;
    index report.html;

    location /ws/ {
        proxy_pass http://127.0.0.1:7890;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location / {
        try_files $uri $uri/ /report.html;
    }
}

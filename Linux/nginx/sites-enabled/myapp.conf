# 可选：强制将HTTP流量重定向到HTTPS，提升安全性
server {
    listen 80;
    listen [::]:80;
    server_name derp.ydphoto.com www.ydphoto.com;

    # 将所有HTTP请求重写到HTTPS版本
    return 301 https://$host$request_uri;
}

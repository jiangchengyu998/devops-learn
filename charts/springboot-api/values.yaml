route:
  gatewayName: traefik-gateway
  host: HOSTNAME

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

fullnameOverride: ""
nameOverride: ""

imagePullSecrets:
  - name: harbor-registry-secret
# restartPolicy: Always
# Default values for springboot-api.
# This is a sensible starting point; customize for your environment.
replicaCount: 1

image:
  repository: 192.168.101.75:8089/library/API-NAME
  tag: "TAG"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

probe:
  enabled: true
  livenessPath: /actuator/health
  readinessPath: /actuator/health
  initialDelaySeconds: 15
  periodSeconds: 10

env:
  - name: SPRING_PROFILES_ACTIVE
    value: ENVIRONMENT

config:
  applicationProperties: |-
    spring.application.name: API-NAME
    server.port: 8080

nodeSelector: {}
tolerations: []
affinity: {}



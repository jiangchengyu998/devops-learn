apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "springboot-api.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "springboot-api.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.route.gatewayName }}
      namespace: {{ .Values.route.namespace | default "kube-system" }}
  hostnames:
    - {{ .Values.route.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.route.path | default "/" }}
      backendRefs:
        - name: {{ include "springboot-api.fullname" . }}
          port: {{ .Values.service.port }}
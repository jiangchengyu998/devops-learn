apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-server
  namespace: default
  labels:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana-server
spec:
  hostnames:
    - grafana.ydphoto.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: yd-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: grafana
          port: 80
          weight: 1